<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الإدارة - معهد IMTS</title>
    <!-- استدعاء الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #B3393E;
            --bg: #F4F7F9;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--accent);
        }

        .login-card h2 {
            font-family: 'Amiri', serif;
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            outline: none;
        }

        button {
            background: linear-gradient(to bottom, var(--accent), #9c2e32);
            color: #fff;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #6e1f22;
            transition: all 0.1s ease;
        }

        button:active {
            box-shadow: 0 0 0 #6e1f22;
            transform: translateY(4px);
        }

        #login-error {
            color: var(--accent);
            margin-top: 15px;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>تسجيل دخول الإدارة</h2>
        
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@imts.com">
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button id="login-btn">دخول لوحة التحكم</button>
        
        <p id="login-error"></p>
    </div>

    <script type="module">
        import { auth } from "./firebase-config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const loginBtn = document.getElementById("login-btn");
        const emailInput = document.getElementById("email");
        const passInput = document.getElementById("password");
        const errorMsg = document.getElementById("login-error");

        loginBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const password = passInput.value.trim();

            if (!email || !password) {
                errorMsg.innerText = "يرجى إدخال البيانات كاملة";
                return;
            }

            try {
                loginBtn.disabled = true;
                loginBtn.innerText = "جاري التحقق...";
                
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "admin.html"; 
                
            } catch (error) {
                console.error(error);
                errorMsg.innerText = "بيانات الدخول غير صحيحة";
                loginBtn.disabled = false;
                loginBtn.innerText = "دخول لوحة التحكم";
            }
        });
    </script>
</body>
</html>
