<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - معهد IMTS</title>
    <link rel="stylesheet" href="admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div class="admin-container">
        <header class="admin-header">
            <h1>لوحة إدارة النتائج الرسمية</h1>
            <p>معهد الدراسات الإدارية والفنية</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('excel-tab')">رفع ملف أكسيل</button>
            <button class="tab-btn" onclick="openTab('manual-tab')">إدخال يدوي فردي</button>
        </div>

        <div id="excel-tab" class="tab-content active">
            <div class="upload-box" id="drop-zone">
                <div class="icon">📊</div>
                <p>اسحب ملف الأكسيل هنا أو اضغط للاختيار</p>
                <input type="file" id="excel-file" accept=".xlsx, .xls" hidden>
                <button class="select-btn" onclick="document.getElementById('excel-file').click()">اختر الملف</button>
            </div>
            <div id="preview-section" style="display:none;">
                <h3>معاينة البيانات (أول 5 طلاب)</h3>
                <div class="table-scroll">
                    <table id="preview-table"></table>
                </div>
                <button id="upload-all-btn" class="main-btn">اعتماد ورفع كافة البيانات إلى قاعدة البيانات</button>
            </div>
        </div>

        <div id="manual-tab" class="tab-content">
            <form id="manual-form" class="grid-form">
                <div class="input-group full">
                    <label>اسم الطالب الرباعي</label>
                    <input type="text" id="m-name" required>
                </div>
                <div class="input-group">
                    <label>رقم الجلوس</label>
                    <input type="text" id="m-id" required>
                </div>
                <div class="input-group">
                    <label>الصف الدراسي</label>
                    <input type="text" id="m-level" placeholder="مثلاً: الرابع الابتدائي">
                </div>
                <div class="grades-grid">
                    <div class="grade-input"><label>عربي</label><input type="number" id="m-arabic" max="20"></div>
                    <div class="grade-input"><label>رياضيات</label><input type="number" id="m-math" max="20"></div>
                    <div class="grade-input"><label>إنجليزي</label><input type="number" id="m-english" max="20"></div>
                    <div class="grade-input"><label>علوم</label><input type="number" id="m-science" max="20"></div>
                    <div class="grade-input"><label>دين</label><input type="number" id="m-religion" max="20"></div>
                    <div class="grade-input"><label>دراسات</label><input type="number" id="m-Social" max="20"></div>
                    <div class="grade-input"><label>تكنولوجيا</label><input type="number" id="m-technology" max="20"></div>
                </div>
                <button type="submit" class="main-btn">حفظ بيانات الطالب</button>
            </form>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
    <script>
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
