<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم المطورة - معهد IMTS</title>
    <link rel="stylesheet" href="admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div class="admin-container">
        <header class="admin-header">
            <h1>إدارة النتائج (عربي / لغات)</h1>
            <p>معهد الدراسات الإدارية والفنية</p>
            <button onclick="logout()" class="logout-btn">تسجيل الخروج</button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('excel-tab')">رفع أكسيل</button>
            <button class="tab-btn" onclick="openTab('manual-tab')">إدخال وبحث يدوي</button>
        </div>

        <!-- تبويب الأكسيل -->
        <div id="excel-tab" class="tab-content active">
            <div class="upload-box" id="drop-zone">
                <div class="icon">📊</div>
                <p>اسحب ملف الأكسيل (يجب شمول عمود القسم والمادة الرفيعة)</p>
                <input type="file" id="excel-file" accept=".xlsx, .xls" hidden>
                <button class="select-btn" onclick="document.getElementById('excel-file').click()">اختر الملف</button>
            </div>
            <div id="preview-section" style="display:none;">
                <table id="preview-table"></table>
                <button id="upload-all-btn" class="main-btn">اعتماد ورفع البيانات</button>
            </div>
        </div>

        <!-- تبويب الإدخال اليدوي -->
        <div id="manual-tab" class="tab-content">
            <div class="admin-search-bar">
                <input type="text" id="quick-search" placeholder="ابحث برقم الجلوس...">
                <button id="fetch-btn">بحث وتعديل</button>
            </div>

            <form id="manual-form" class="grid-form">
                <div class="input-group">
                    <label>حالة النتيجة</label>
                    <select id="m-active" class="status-select">
                        <option value="true">فعال (ظاهرة)</option>
                        <option value="false">غير فعال (محجوبة)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>القسم التعليمي</label>
                    <select id="m-system" class="status-select">
                        <option value="عربي">قسم العربي</option>
                        <option value="لغات">قسم اللغات</option>
                    </select>
                </div>
                <div class="input-group full">
                    <label>اسم الطالب</label>
                    <input type="text" id="m-name" required>
                </div>
                <div class="input-group">
                    <label>رقم الجلوس</label>
                    <input type="text" id="m-id" required>
                </div>
                <div class="input-group">
                    <label>الصف الدراسي</label>
                    <input type="text" id="m-level">
                </div>
                <div class="grades-grid">
                    <div class="grade-input"><label>عربي</label><input type="number" id="m-arabic"></div>
                    <div class="grade-input"><label>رياضيات/Math</label><input type="number" id="m-math"></div>
                    <div class="grade-input"><label>إنجليزي</label><input type="number" id="m-english"></div>
                    <div class="grade-input"><label>علوم/Science</label><input type="number" id="m-science"></div>
                    <div class="grade-input"><label>دين</label><input type="number" id="m-religion"></div>
                    <div class="grade-input"><label>دراسات</label><input type="number" id="m-Social"></div>
                    <div class="grade-input"><label>تكنولوجيا/ICT</label><input type="number" id="m-technology"></div>
                    <div class="grade-input" style="background: #fff3f3;"><label>مستوى رفيع</label><input type="number" id="m-highlevel"></div>
                </div>
                <button type="submit" class="main-btn">حفظ البيانات</button>
            </form>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
    <script>
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
