<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم المطورة - معهد IMTS</title>
    <link rel="stylesheet" href="admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="admin-container">
        <header class="admin-header">
            <h1>إدارة النتائج (عربي / لغات)</h1>
            <p>معهد الدراسات الإدارية والفنية</p>
            <button onclick="logout()" class="logout-btn">تسجيل الخروج</button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('excel-tab')">رفع أكسيل</button>
            <button class="tab-btn" onclick="openTab('manual-tab')">إدخال وبحث يدوي</button>
        </div>

        <!-- تبويب الأكسيل -->
        <div id="excel-tab" class="tab-content active">
            <div class="upload-box" id="drop-zone">
                <div class="icon">📊</div>
                <p>اسحب ملف الأكسيل (يجب شمول عمود القسم والمادة الرفيعة)</p>
                <input type="file" id="excel-file" accept=".xlsx, .xls" hidden>
                <button class="select-btn" onclick="document.getElementById('excel-file').click()">اختر الملف</button>
            </div>
            <div id="preview-section" style="display:none;">
                <table id="preview-table"></table>
                <button id="upload-all-btn" class="main-btn">اعتماد ورفع البيانات</button>
            </div>
        </div>

        <!-- تبويب الإدخال اليدوي -->
        <div id="manual-tab" class="tab-content">
            <div class="admin-search-bar">
                <input type="text" id="quick-search" placeholder="ابحث برقم الجلوس...">
                <button id="fetch-btn">بحث وتعديل</button>
                <button id="export-btn" style="background: linear-gradient(to bottom, #27ae60, #1e8449); box-shadow: 0 4px 0 #145a32;">تصدير للإكسيل</button>
            </div>

            <form id="manual-form" class="grid-form">
                <div class="input-group">
                    <label>حالة النتيجة</label>
                    <select id="m-active" class="status-select">
                        <option value="true">فعال (ظاهرة)</option>
                        <option value="false">غير فعال (محجوبة)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>القسم التعليمي</label>
                    <select id="m-system" class="status-select">
                        <option value="عربي">قسم العربي</option>
                        <option value="لغات">قسم اللغات</option>
                    </select>
                </div>
                <!-- أضيفي هذه الخانات داخل manual-form في ملف admin.html -->
<div class="input-group">
    <label>الجنس</label>
    <select id="m-gender" class="status-select">
        <option value="ذكر">ذكر</option>
        <option value="أنثى">أنثى</option>
    </select>
</div>

<div class="input-group">
    <label>الديانة</label>
    <select id="m-religion-type" class="status-select">
        <option value="مسلم">مسلم</option>
        <option value="مسيحي">مسيحي</option>
    </select>
</div>
                <div class="input-group full">
                    <label>اسم الطالب</label>
                    <input type="text" id="m-name" required>
                </div>
                <div class="input-group">
                    <label>رقم الجلوس</label>
                    <input type="text" id="m-id" required>
                </div>
                <div class="input-group">
                    <label>الصف الدراسي</label>
                    <input type="text" id="m-level">
                </div>
                <div class="grades-grid">
    <div class="grade-input"><label>عربي</label><input type="text" id="m-arabic"></div>
    <div class="grade-input"><label>رياضيات</label><input type="text" id="m-math"></div>
    <div class="grade-input"><label>إنجليزي</label><input type="text" id="m-english"></div>
    <div class="grade-input"><label>علوم</label><input type="text" id="m-science"></div>
    <div class="grade-input"><label>دين</label><input type="text" id="m-religion"></div>
    <div class="grade-input"><label>دراسات</label><input type="text" id="m-Social"></div>
    <div class="grade-input"><label>تكنولوجيا</label><input type="text" id="m-technology"></div>
    <div class="grade-input" style="background:#fff0f0;"><label>مستوى رفيع</label><input type="text" id="m-highlevel"></div>
</div>
              <div class="form-actions" style="grid-column: span 2; display: flex; gap: 15px; margin-top: 10px;">
                    <button type="submit" class="main-btn" style="flex: 2; margin-top: 0;">حفظ البيانات</button>
                    <button type="button" id="delete-btn" class="main-btn" style="flex: 1; margin-top: 0; background: linear-gradient(to bottom, #e74c3c, #c0392b); box-shadow: 0 4px 0 #922b21;">حذف الطالب</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
    <script>
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
