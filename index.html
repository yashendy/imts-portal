<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة نتائج معهد IMTS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-login-link">
        <a href="login.html" class="admin-btn-small">دخول الإدارة</a>
    </div>

    <div id="search-section" class="search-container">
        <h2 class="title-diwani">استعلام نتائج معهد IMTS</h2>
        <input type="text" id="student-id-input" placeholder="أدخل رقم الجلوس">
        <button id="search-btn">عرض الشهادة الرسمية</button>
    </div>

    <div id="certificate-section" class="certificate-wrapper" style="display: none;">
        <div class="close-cert-container no-print">
            <button id="close-cert-btn" class="close-btn">× إغلاق الشهادة والعودة للبحث</button>
        </div>

        <div class="cert-border">
            <div class="cert-header">
                <div class="header-logo-left">
                    <img src="logo.png" alt="شعار" class="logo-img">
                </div>
                <div class="header-text-center">
                    <h1 class="main-title">معهد الدراسات الإدارية والفنية</h1>
                    <h2 class="sub-title">شهادة درجات الفصل الدراسي الثاني 2025-2026</h2>
                </div>
                <div class="header-logo-right">
                    <h2 class="logo-text">I.M.T.S</h2>
                </div>
            </div>

            <div class="student-info-row">
                <p><strong>اسم الطالب:</strong> <span id="cert-name"></span></p>
                <p><strong>الصف:</strong> <span id="cert-level"></span></p>
                <p><strong>الشعبة:</strong> <span id="cert-system"></span></p>
                <p><strong>رقم الجلوس:</strong> <span id="cert-id"></span></p>
            </div>

            <div class="main-content">
                <!-- هذا هو الجزء الأهم الذي كان ناقصاً -->
                <table id="grades-table-main" class="grades-table-horizontal">
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>

            <div class="cert-footer">
                <div class="result-statement" id="statement"></div>
                <div class="signature-section">
                    <div class="signature-box">
                        <p>مديرة المعهد</p>
                        <img src="signature.png" class="signature-img">
                    </div>
                </div>
            </div>

            <button id="print-btn" class="main-btn-print no-print">طباعة الشهادة الآن</button>
        </div>
    </div>

    <script type="module" src="student.js?v=1.3"></script>
</body>
</html>
