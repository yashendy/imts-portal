<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة معهد IMTS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- صفحة البحث المركزية -->
    <div id="search-section" class="search-container">
        <h2 class="title-diwani">استعلام نتائج معهد IMTS</h2>
        <input type="text" id="student-id-input" placeholder="أدخل رقم الجلوس">
        <button id="search-btn">عرض الشهادة الرسمية</button>
        <p id="error-msg" class="error"></p>
    </div>

    <!-- قسم الشهادة -->
    <div id="certificate-section" class="certificate-wrapper" style="display: none;">
        <div class="cert-border">
            <div class="cert-header">
                <div class="header-text">
                    <h1 class="title-thuluth">معهد الدراسات الإدارية والفنية</h1>
                    <h2 class="title-diwani">نتيجة التقييم التحصيلي - 2026</h2>
                </div>
                <img src="logo.png" alt="شعار المعهد" class="logo-right">
            </div>

            <div class="cert-body">
                <div class="sidebar">
                    <img src="https://via.placeholder.com/110" class="student-img" style="border-radius: 10px; border: 3px solid #fff; margin-bottom: 15px;">
                    <h3 id="cert-name" class="title-diwani"></h3>
                    <div class="info-box">
                        <div class="info-item">الصف الدراسي <span id="cert-level"></span></div>
                        <div class="info-item">النظام <span id="cert-system"></span></div>
                        <div class="info-item">رقم الجلوس <span id="cert-id"></span></div>
                    </div>
                </div>

                <div class="main-content">
                    <table class="grades-table">
                        <thead>
                            <tr><th>المادة الدراسية</th><th>الدرجة</th><th>التقدير</th></tr>
                        </thead>
                        <tbody id="grades-body">
                            <!-- تعبئة الدرجات برمجياً -->
                        </tbody>
                        <tfoot>
                            <tr class="total-row">
                                <td>المجموع الكلي</td>
                                <td id="total-score"></td>
                                <td id="total-eval"></td>
                            </tr>
                        </tfoot>
                    </table>

                    <div class="result-statement" id="statement"></div>

                    <div class="footer-section">
                        <div class="signature-box">
                            <p style="margin:0; font-weight:bold;">مديرة المعهد</p>
                            <img src="signature.png" class="signature-img">
                        </div>
                    </div>
                </div>
            </div>
            <button id="print-btn" onclick="window.print()">طباعة الشهادة الآن</button>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="student.js"></script>
</body>
</html>
